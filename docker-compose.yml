services:
  api:
    build:
      context: ./api
    image: ghcr.io/${GITHUB_USERNAME}/Football_Management:latest
    # Khởi động lại nếu bị crash hoặc server reboot
    restart: unless-stopped
    ports: 
      - "3000:3005"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # Phụ thuộc vào
    depends_on:                                  # MISSING: không có depends_on mysql/redis
        - mysql
        - redis
    networks:
        - app_network
  mysql:
    image: mysql:8.0
    container_name: api-mysql
    restart: unless-stopped
    environment:
    # Đặt mật khẩu cho root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    # tạo và gắn volume để lưu dữ liệu MySQL.
    volumes:
      - mysql_data:/var/lib/mysql
    networks: 
      - app_network
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - app_network
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - app_network
volumes:
  mysql_data:
  redis_data:
networks:                                        # MISSING: thiếu block networks ở root level
  app_network:
    driver: bridge