name: CI/CD

on:
# Khi push request được tạo trên nhánh master, workflow này sẽ được kích hoạt
  push:
    branches: [ "master" ]

env:
  IMAGE_API: ghcr.io/${{ github.repository_owner  }}/football_management

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api
    strategy:
      matrix:
        node-version: [20]

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Nodejs
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install DI API
      run: npm ci

    - name: INSTALL DI FE
      run: npm ci
      working-directory: frontend

    - name: GENERATE PRISMA
      run: npx prisma generate
    # - name: LINT
    #   run: npm run lint || true
    
    - name: BUILD API
      run: npm run build

    - name: BUILD FE
      run: npm run build
      working-directory: frontend
    # - name: TEST
    #   run: npm test
  # deploy-api:
  #   name: Deploy
  #   run: ubuntu-latest
  #   needs: ci
  #   steps: 
  #     - uses: actions/checkout@v4
  build-push:
    name: BUILD AND PUSH IMAGE
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4


      - name: Normalize image name to lowercase
        run: echo "IMAGE_API=$(echo '${{ env.IMAGE_API }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
 
      - uses: docker/setup-buildx-action@v4
      - name: LOGIN GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: DOCKER METADATA
        id: meta
        uses: docker/metadata-action@v5
        with: 
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
