name: CI/CD

on:
# Khi push request được tạo trên nhánh master, workflow này sẽ được kích hoạt
  push:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FOOTBALL_MANAGEMENT
    strategy:
      matrix:
        node-version: [20]



    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Nodejs
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install DI
      run: npm ci
      working-directory: FOOTBALL_MANAGEMENT/api
    
    - name: LINT
      run: npm run lint
    
    - name: BUILD
      run: npm run build

    - name: TEST
      run: npm test
